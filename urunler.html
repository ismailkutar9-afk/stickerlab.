<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ürünler — StickerLab</title>
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Familjen+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF8E7;--ink:#1A1A1A;--hot:#FF3D5A;--lime:#C8FF3D;--sky:#4DCBFF;--plum:#6E2BFF;--cream:#FFEDB8;--paper:#FFFDF5;--shadow:6px 6px 0 var(--ink);--shadow-sm:4px 4px 0 var(--ink)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Familjen Grotesk',sans-serif}
body{background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,.07) 1px,transparent 0);background-size:22px 22px}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 40px;border-bottom:3px solid var(--ink);background:var(--bg);position:sticky;top:0;z-index:200}
.logo{font-family:'Bowlby One';font-size:26px;letter-spacing:-1px;transform:rotate(-2deg);display:inline-block}.logo span{color:var(--hot)}
.nav-right{display:flex;gap:10px;align-items:center}
.back-btn{font-weight:700;font-size:13px;border:2px solid var(--ink);padding:8px 20px;border-radius:999px;cursor:pointer;background:var(--bg);transition:all .2s}.back-btn:hover{background:var(--lime)}
.cart-btn{display:flex;align-items:center;gap:8px;background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer}.cart-btn:hover{background:var(--hot)}
.cart-dot{background:var(--hot);color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:900}

/* HEADER */
.page-head{background:var(--ink);color:var(--bg);padding:48px 60px;border-bottom:3px solid var(--ink)}
.page-head-in{max-width:1600px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:20px}
.ph-title{font-family:'Bowlby One';font-size:clamp(36px,5vw,64px);letter-spacing:-2px}
.ph-title span{color:var(--lime)}
.ph-count{font-size:14px;opacity:.5;margin-top:8px}

/* ARAMA + FİLTRE */
.toolbar{max-width:1600px;margin:0 auto;padding:24px 60px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:2px solid rgba(0,0,0,.08)}
.search-box{display:flex;align-items:center;gap:10px;background:var(--paper);border:3px solid var(--ink);border-radius:14px;padding:10px 18px;flex:1;min-width:200px;max-width:360px;box-shadow:var(--shadow-sm)}
.search-box input{border:none;outline:none;font-family:'Familjen Grotesk';font-size:15px;background:transparent;width:100%}
.sort-sel{padding:11px 16px;border:3px solid var(--ink);border-radius:12px;font-family:'Familjen Grotesk';font-size:14px;font-weight:600;background:var(--bg);cursor:pointer;outline:none}
.view-btns{display:flex;gap:4px;background:var(--ink);border-radius:10px;padding:4px}
.view-btn{width:32px;height:32px;display:grid;place-items:center;font-size:16px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.4);transition:all .15s}
.view-btn.active{background:var(--hot);color:#fff}

/* KATEGORİ FİLTRE */
.cat-bar{max-width:1600px;margin:0 auto;padding:16px 60px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:2px solid rgba(0,0,0,.06)}
.cat-chip{padding:8px 18px;border:2px solid var(--ink);border-radius:999px;font-weight:700;font-size:12px;cursor:pointer;background:var(--bg);transition:all .15s;white-space:nowrap}
.cat-chip:hover{background:var(--cream)}.cat-chip.active{background:var(--ink);color:var(--bg)}

/* ÜRÜN GRID */
.products-section{max-width:1600px;margin:0 auto;padding:32px 60px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.prod-grid.list-view{grid-template-columns:1fr}

/* ÜRÜN KARTI */
.prod-card{background:var(--paper);border:3px solid var(--ink);border-radius:20px;overflow:hidden;cursor:pointer;transition:all .22s;box-shadow:var(--shadow-sm);position:relative}
.prod-card:hover{transform:translate(-3px,-3px);box-shadow:7px 7px 0 var(--ink)}
.prod-card.list-view{display:grid;grid-template-columns:120px 1fr auto;align-items:center}
.prod-img{aspect-ratio:1;overflow:hidden;background:#f5f0e8;display:flex;align-items:center;justify-content:center;position:relative}
.prod-img.list-view{aspect-ratio:1;height:120px}
.prod-img img{width:100%;height:100%;object-fit:contain;padding:8px;transition:transform .4s}
.prod-card:hover .prod-img img{transform:scale(1.06)}
.prod-img-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.prod-img-loader .sp{width:28px;height:28px;border:3px solid rgba(0,0,0,.08);border-top-color:var(--hot);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.prod-badge{position:absolute;top:10px;left:10px;background:var(--hot);color:#fff;font-family:'Bowlby One';font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:999px;border:2px solid #fff}
.prod-info{padding:16px}
.prod-cat{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.4;margin-bottom:5px}
.prod-name{font-family:'Bowlby One';font-size:16px;letter-spacing:-.5px;margin-bottom:8px;line-height:1.2}
.prod-footer{display:flex;align-items:center;justify-content:space-between}
.prod-price{font-family:'Bowlby One';font-size:20px;color:var(--hot)}
.prod-add{width:36px;height:36px;border:3px solid var(--ink);border-radius:10px;display:grid;place-items:center;font-size:18px;transition:all .15s}
.prod-add:hover{background:var(--lime);transform:rotate(90deg)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:var(--bg);border:3px solid var(--ink);border-radius:24px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-head{padding:24px 28px;border-bottom:3px solid var(--ink);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:1}
.modal-head h2{font-family:'Bowlby One';font-size:20px}
.modal-close{font-size:28px;cursor:pointer;opacity:.4}.modal-close:hover{opacity:1}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.modal-left{padding:28px;border-right:3px solid var(--ink)}
.modal-img{aspect-ratio:1;border:2px solid rgba(0,0,0,.08);border-radius:16px;overflow:hidden;background:#f5f0e8;margin-bottom:16px}
.modal-img img{width:100%;height:100%;object-fit:contain;padding:16px}
.modal-right{padding:28px}
.modal-cat{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.4;margin-bottom:8px}
.modal-name{font-family:'Bowlby One';font-size:28px;letter-spacing:-1px;margin-bottom:16px}
.modal-price{font-family:'Bowlby One';font-size:42px;color:var(--hot);margin-bottom:20px;letter-spacing:-1px}
.modal-opts label{font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin-bottom:8px;display:block}
.modal-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.m-chip{padding:9px 16px;border:3px solid var(--ink);border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;background:var(--bg);transition:all .15s}.m-chip:hover{background:var(--lime)}.m-chip.active{background:var(--ink);color:var(--bg)}
.modal-qty{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.mq-btn{width:36px;height:36px;border:3px solid var(--ink);border-radius:10px;display:grid;place-items:center;font-size:20px;font-weight:700;cursor:pointer;transition:background .15s}.mq-btn:hover{background:var(--lime)}
.mq-v{font-family:'Bowlby One';font-size:24px;min-width:40px;text-align:center}
.modal-total{font-family:'Bowlby One';font-size:20px;color:var(--hot);margin-bottom:16px}
.modal-add-btn{width:100%;padding:16px;background:var(--hot);color:#fff;border:3px solid var(--ink);border-radius:14px;font-family:'Bowlby One';font-size:18px;letter-spacing:1px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s}.modal-add-btn:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow)}

/* SEPET */
.cart-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-ov.open{opacity:1;pointer-events:all}
.cart-dr{position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--bg);border-left:3px solid var(--ink);z-index:501;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cart-dr.open{transform:translateX(0)}
.cd-head{padding:20px 22px;border-bottom:3px solid var(--ink);display:flex;align-items:center;justify-content:space-between}
.cd-head h2{font-family:'Bowlby One';font-size:20px}
.cd-close{font-size:24px;cursor:pointer;opacity:.4}.cd-close:hover{opacity:1}
.cd-items{flex:1;overflow-y:auto;padding:14px}
.cd-item{background:var(--paper);border:2px solid var(--ink);border-radius:14px;padding:14px;margin-bottom:10px;display:grid;grid-template-columns:64px 1fr;gap:12px;align-items:start}
.cd-img{width:64px;height:64px;border:2px solid var(--ink);border-radius:10px;overflow:hidden}
.cd-img img{width:100%;height:100%;object-fit:contain;padding:4px}
.cd-name{font-family:'Bowlby One';font-size:13px;margin-bottom:3px}
.cd-detail{font-size:11px;opacity:.55;margin-bottom:6px}
.cd-foot-row{display:flex;align-items:center;justify-content:space-between}
.cd-price{font-family:'Bowlby One';font-size:16px;color:var(--hot)}
.cd-remove{font-size:11px;color:var(--hot);cursor:pointer;font-weight:700}
.cd-foot{padding:16px 22px;border-top:3px solid var(--ink)}
.cd-total{font-family:'Bowlby One';font-size:28px;color:var(--hot);margin-bottom:12px}
.cd-checkout{width:100%;padding:14px;background:var(--hot);color:#fff;border:3px solid var(--ink);border-radius:12px;font-family:'Bowlby One';font-size:16px;cursor:pointer;transition:all .2s}.cd-checkout:hover{transform:translateY(-2px)}
.cd-empty{text-align:center;padding:48px 20px;opacity:.4;font-size:14px}

/* YÜKLEME */
.load-more{display:block;margin:40px auto;padding:14px 40px;border:3px solid var(--ink);border-radius:14px;font-family:'Bowlby One';font-size:16px;letter-spacing:.5px;cursor:pointer;background:var(--bg);transition:all .2s;box-shadow:var(--shadow-sm)}.load-more:hover{background:var(--lime);transform:translate(-2px,-2px);box-shadow:var(--shadow)}
.no-result{text-align:center;padding:80px;opacity:.4}
.no-result h3{font-family:'Bowlby One';font-size:28px;margin-bottom:8px}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:var(--bg);padding:12px 24px;border-radius:999px;border:3px solid var(--hot);font-weight:700;font-size:14px;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  .nav{padding:12px 20px}.page-head,.toolbar,.cat-bar,.products-section{padding-left:20px;padding-right:20px}
  .prod-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .modal-body{grid-template-columns:1fr}.modal-left{border-right:none;border-bottom:3px solid var(--ink)}
  .cart-dr{width:100%}
}
.fav-btn{position:relative;width:40px;height:40px;border-radius:50%;border:2px solid var(--ink);display:grid;place-items:center;font-size:16px;transition:background .15s,transform .15s;background:var(--bg)}
.fav-btn:hover{background:var(--hot);transform:scale(1.1)}
.fav-count{position:absolute;top:-6px;right:-6px;background:var(--hot);color:#fff;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:none;place-items:center;border:2px solid var(--bg)}
.fav-heart{position:absolute;top:10px;right:10px;z-index:3;width:36px;height:36px;border-radius:50%;border:2px solid var(--ink);background:rgba(255,255,255,.9);display:grid;place-items:center;font-size:16px;transition:transform .15s,background .15s}
.fav-heart:hover{transform:scale(1.15);background:#fff}
.fav-heart.active{background:var(--hot);border-color:var(--hot)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="cart-ov" id="cartOv" onclick="closeCart()"></div>

<!-- SEPET -->
<div class="cart-dr" id="cartDr">
  <div class="cd-head"><h2>🛒 Sepetim</h2><div class="cd-close" onclick="closeCart()">×</div></div>
  <div class="cd-items" id="cdItems"><div class="cd-empty">📭 Sepetiniz boş</div></div>
  <div class="cd-foot">
    <div class="cd-total" id="cdTotal">0₺</div>
    <button class="cd-checkout" onclick="checkout()">Siparişi Tamamla →</button>
  </div>
</div>

<!-- ÜRÜN MODAL -->
<div class="modal-ov" id="prodModal">
  <div class="modal">
    <div class="modal-head"><h2 id="mTitle">Ürün Detayı</h2><div class="modal-close" onclick="closeModal()">×</div></div>
    <div class="modal-body">
      <div class="modal-left">
        <div class="modal-img"><img id="mImg" src="" alt=""></div>
      </div>
      <div class="modal-right">
        <div class="modal-cat" id="mCat"></div>
        <div class="modal-name" id="mName"></div>
        <div class="modal-price" id="mPrice"></div>
        <div class="modal-opts">
          <label>Boyut</label>
          <div class="modal-chips" id="mBoyut">
            <button class="m-chip" onclick="mSelOpt(this,'boyut','5cm',0)">5cm</button>
            <button class="m-chip active" onclick="mSelOpt(this,'boyut','7cm',10)">7cm</button>
            <button class="m-chip" onclick="mSelOpt(this,'boyut','10cm',25)">10cm</button>
            <button class="m-chip" onclick="mSelOpt(this,'boyut','15cm',50)">15cm</button>
            <button class="m-chip" onclick="mSelOpt(this,'boyut','A3 (30×42cm)',150)">A3 📄</button>
          </div>
          <label>Malzeme</label>
          <div class="modal-chips" id="mMalzeme">
            <button class="m-chip active" onclick="mSelOpt(this,'malzeme','Parlak',0)">✨ Parlak</button>
            <button class="m-chip" onclick="mSelOpt(this,'malzeme','Mat',0)">🌫️ Mat</button>
            <button class="m-chip" onclick="mSelOpt(this,'malzeme','Holografik',20)">🌈 Holo +20₺</button>
          </div>
          <label>Adet</label>
          <div class="modal-qty">
            <button class="mq-btn" onclick="mQty(-1)">−</button>
            <div class="mq-v" id="mQtyVal">1</div>
            <button class="mq-btn" onclick="mQty(1)">+</button>
          </div>
          <div class="modal-total" id="mTotal"></div>
        </div>
        <button class="modal-add-btn" onclick="modalSepet()">🛒 Sepete Ekle</button>
      </div>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="logo">Sticker<span>Lab.</span></a>
  <div class="nav-right">
    <button class="back-btn" onclick="history.back()">← Geri</button>
    <a href="#" class="ikas-satinal" style="display:none;font-weight:700;font-size:13px;border:2px solid var(--ink);background:var(--lime);padding:8px 16px;border-radius:999px;text-decoration:none;color:inherit">🛒 Satın Al</a>
    <a href="favoriler.html" class="fav-btn" title="Favorilerim">❤️<span class="fav-count">0</span></a>
    <button class="cart-btn" onclick="openCart()">🛒 <div class="cart-dot" id="cartDot">0</div></button>
  </div>
</nav>

<!-- HEADER -->
<div class="page-head">
  <div class="page-head-in">
    <div>
      <div class="ph-title">TÜM <span>STİCKERLAR</span></div>
      <div class="ph-count" id="phCount">Yükleniyor...</div>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-box">
    🔍
    <input type="text" id="searchInp" placeholder="Sticker ara…" oninput="filtrele()">
  </div>
  <select class="sort-sel" id="sortSel" onchange="sirala()">
    <option value="default">Varsayılan</option>
    <option value="fiyat_asc">Fiyat: Düşük → Yüksek</option>
    <option value="fiyat_desc">Fiyat: Yüksek → Düşük</option>
    <option value="isim">İsme Göre</option>
  </select>
  <div class="view-btns">
    <button class="view-btn active" id="vGrid" onclick="setView('grid')" title="Grid">⊞</button>
    <button class="view-btn" id="vList" onclick="setView('list')" title="Liste">≡</button>
  </div>
</div>

<!-- KATEGORİ BAR -->
<div class="cat-bar" id="catBar"></div>

<!-- ÜRÜNLER -->
<div class="products-section">
  <div class="prod-grid" id="prodGrid">
    <!-- JS ile doldurulur -->
  </div>
  <button class="load-more" id="loadMoreBtn" onclick="dahaFazla()" style="display:none">Daha Fazla Yükle ↓</button>
  <div class="no-result" id="noResult" style="display:none">
    <h3>🔍 Sonuç bulunamadı</h3>
    <p>Farklı bir arama dene</p>
  </div>
</div>

<script src="ikas-config.js"></script>
<script src="ikas-yonlendir.js"></script>
<script src="favoriler.js"></script>
<script>
// ── STATE ──
let tumUrunler = [];
let filtreliUrunler = [];
let aktifKat = 'hepsi';
let viewMod = 'grid';
let gosterilen = 0;
const SAYFA_BOYUT = 24;

// Modal state
let modalUrun = null;
let mBoyutEkstra = 10;
let mMalzemeEkstra = 0;
let mQtyV = 1;
let sepet = [];

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

// ── JSON'DAN ÜRÜN YÜKLEMİ ──
async function yukle(){
  try {
    // urunler.json dosyasından yükle
    const r = await fetch('urunler.json');
    if(!r.ok) throw new Error('urunler.json bulunamadı');
    const data = await r.json();
    tumUrunler = data.urunler || [];
    document.getElementById('phCount').textContent = `${tumUrunler.length} sticker`;
    katBarKur();
    filtrele();
  } catch(e) {
    // Demo modu — urunler.json yokken örnek ürünler göster
    demoMod();
  }
}

function demoMod(){
  const CLOUD = "dexphfesr";
  // Birkaç örnek ürün — gerçek JSON gelince değişir
  tumUrunler = [
    {id:'demo1',public_id:'sample',isim:'Örnek Sticker 1',kategori:'genel',fiyat:79,
     thumbnail:`https://res.cloudinary.com/${CLOUD}/image/upload/w_400,h_400,c_pad,b_white,f_webp,q_auto/sample`,
     buyuk:`https://res.cloudinary.com/${CLOUD}/image/upload/w_800,h_800,c_pad,b_white,f_webp,q_auto/sample`},
  ];
  document.getElementById('phCount').textContent = '⚠️ urunler.json yüklenmedi — demo mod';
  katBarKur();
  filtrele();
}

// ── KATEGORİ BAR ──
const KAT_ISIM = {
  hepsi:'🎯 Tümü', cyberpunk:'⚡ Cyberpunk',
  minimalist:'◻️ Minimalist', mix:'🎲 Mix', pixel:'👾 Pixel',
  manga:'⛩️ Manga', '3d_clay':'🧱 3D Clay', vaporwave:'🌴 Vaporwave',
  watercolor:'🎨 Suluboya', cottagecore:'🌿 Cottagecore', y2k:'💿 Y2K',
  graffiti:'🎨 Graffiti', jdm:'🚗 JDM', bosozoku:'🏍️ Bosozoku',
  kawaii:'🌸 Kawaii', retro_anime:'📺 Retro Anime',
  ders:'🎓 Ders',
  genel:'✨ Genel'
};

// ── FAVORİ ──
function katEmoji(kat){ return (KAT_ISIM[kat]||'').split(' ')[0] || '⭐'; }
function toggleFav(id, btn){
  const u = tumUrunler.find(x=>x.id===id); if(!u) return;
  const eklendi = Fav.toggle({name:u.isim, emoji:katEmoji(u.kategori), fiyat:u.fiyat, img:u.thumbnail});
  btn.textContent = eklendi ? '❤️' : '🤍';
  btn.classList.toggle('active', eklendi);
  Fav.rozetGuncelle();
}

function katBarKur(){
  const katlar = ['hepsi', ...new Set(tumUrunler.map(u=>u.kategori).filter(Boolean))];
  document.getElementById('catBar').innerHTML = katlar.map(k=>`
    <button class="cat-chip${k===aktifKat?' active':''}" onclick="setKat('${k}')">${KAT_ISIM[k]||k}</button>
  `).join('');
}

function setKat(kat){
  aktifKat = kat;
  gosterilen = 0;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.toggle('active',c.textContent.trim()===( KAT_ISIM[kat]||kat)));
  filtrele();
}

// ── FİLTRELE ──
function filtrele(){
  const q = document.getElementById('searchInp').value.toLowerCase().trim();
  filtreliUrunler = tumUrunler.filter(u=>{
    const katOk = aktifKat==='hepsi' || u.kategori===aktifKat;
    const aramaOk = !q || u.isim.toLowerCase().includes(q) || u.kategori.toLowerCase().includes(q) || u.public_id.toLowerCase().includes(q);
    return katOk && aramaOk;
  });
  sirala();
}

function sirala(){
  const s = document.getElementById('sortSel').value;
  if(s==='fiyat_asc') filtreliUrunler.sort((a,b)=>a.fiyat-b.fiyat);
  else if(s==='fiyat_desc') filtreliUrunler.sort((a,b)=>b.fiyat-a.fiyat);
  else if(s==='isim') filtreliUrunler.sort((a,b)=>a.isim.localeCompare(b.isim,'tr'));
  gosterilen = 0;
  renderUrunler();
}

// ── RENDER ──
function renderUrunler(){
  const grid = document.getElementById('prodGrid');
  const slice = filtreliUrunler.slice(0, gosterilen+SAYFA_BOYUT);
  gosterilen = slice.length;

  if(!filtreliUrunler.length){
    grid.innerHTML=''; document.getElementById('noResult').style.display='block';
    document.getElementById('loadMoreBtn').style.display='none'; return;
  }
  document.getElementById('noResult').style.display='none';

  const isListView = viewMod==='list';
  grid.className = `prod-grid${isListView?' list-view':''}`;

  grid.innerHTML = slice.map(u=>`
    <div class="prod-card${isListView?' list-view':''}" onclick="openModal('${u.id}')">
      <div class="prod-img${isListView?' list-view':''}">
        <div class="prod-img-loader"><div class="sp"></div></div>
        <img src="${u.thumbnail}" alt="${u.isim}" loading="lazy" onload="this.previousElementSibling.style.display='none'" onerror="this.src='https://placehold.co/400x400/FFF8E7/1A1A1A?text=StickerLab';this.previousElementSibling.style.display='none'">
      </div>
      <button class="fav-heart${Fav.ekliMi(u.isim)?' active':''}" onclick="event.stopPropagation();toggleFav('${u.id}',this)">${Fav.ekliMi(u.isim)?'❤️':'🤍'}</button>
      <div class="prod-info">
        <div class="prod-cat">${KAT_ISIM[u.kategori]||u.kategori}</div>
        <div class="prod-name">${u.isim}</div>
        <div class="prod-footer">
          <div class="prod-price">${u.fiyat}₺</div>
          <button class="prod-add" onclick="event.stopPropagation();hizliSepet('${u.id}')">+</button>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('loadMoreBtn').style.display = gosterilen<filtreliUrunler.length?'block':'none';
  document.getElementById('phCount').textContent = `${filtreliUrunler.length} sticker${aktifKat!=='hepsi'?' ('+filtreliUrunler.length+'/'+tumUrunler.length+')':''}`;
}

function dahaFazla(){
  const slice = filtreliUrunler.slice(0, gosterilen+SAYFA_BOYUT);
  const yeniKartlar = slice.slice(gosterilen);
  gosterilen = slice.length;
  const isListView = viewMod==='list';
  document.getElementById('prodGrid').innerHTML += yeniKartlar.map(u=>`
    <div class="prod-card${isListView?' list-view':''}" onclick="openModal('${u.id}')">
      <div class="prod-img${isListView?' list-view':''}">
        <div class="prod-img-loader"><div class="sp"></div></div>
        <img src="${u.thumbnail}" alt="${u.isim}" loading="lazy" onload="this.previousElementSibling.style.display='none'" onerror="this.src='https://placehold.co/400x400/FFF8E7/1A1A1A?text=StickerLab';this.previousElementSibling.style.display='none'">
      </div>
      <button class="fav-heart${Fav.ekliMi(u.isim)?' active':''}" onclick="event.stopPropagation();toggleFav('${u.id}',this)">${Fav.ekliMi(u.isim)?'❤️':'🤍'}</button>
      <div class="prod-info">
        <div class="prod-cat">${KAT_ISIM[u.kategori]||u.kategori}</div>
        <div class="prod-name">${u.isim}</div>
        <div class="prod-footer">
          <div class="prod-price">${u.fiyat}₺</div>
          <button class="prod-add" onclick="event.stopPropagation();hizliSepet('${u.id}')">+</button>
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('loadMoreBtn').style.display = gosterilen<filtreliUrunler.length?'block':'none';
}

function setView(v){
  viewMod=v;
  document.getElementById('vGrid').classList.toggle('active',v==='grid');
  document.getElementById('vList').classList.toggle('active',v==='list');
  renderUrunler();
}

// ── MODAL ──
function openModal(id){
  const u = tumUrunler.find(x=>x.id===id); if(!u)return;
  modalUrun=u; mBoyutEkstra=10; mMalzemeEkstra=0; mQtyV=1;
  document.getElementById('mImg').src=u.buyuk||u.thumbnail;
  document.getElementById('mCat').textContent=KAT_ISIM[u.kategori]||u.kategori;
  document.getElementById('mTitle').textContent=u.isim;
  document.getElementById('mName').textContent=u.isim;
  document.getElementById('mPrice').textContent=u.fiyat+'₺';
  document.getElementById('mQtyVal').textContent=1;
  mHesapla();
  document.getElementById('prodModal').classList.add('open');
}
function closeModal(){document.getElementById('prodModal').classList.remove('open')}

function mSelOpt(el,grp,val,extra){
  el.closest('.modal-chips').querySelectorAll('.m-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(grp==='boyut') mBoyutEkstra=extra;
  else if(grp==='malzeme') mMalzemeEkstra=extra;
  mHesapla();
}
function mQty(d){mQtyV=Math.max(1,Math.min(100,mQtyV+d));document.getElementById('mQtyVal').textContent=mQtyV;mHesapla();}
function mHesapla(){
  if(!modalUrun)return;
  const total=(modalUrun.fiyat+mBoyutEkstra+mMalzemeEkstra)*mQtyV;
  document.getElementById('mTotal').textContent=`Toplam: ${total}₺`;
}
function modalSepet(){
  if(!modalUrun)return;
  sepetEkle(modalUrun,mQtyV,mBoyutEkstra,mMalzemeEkstra);
  closeModal();
}
function hizliSepet(id){
  const u=tumUrunler.find(x=>x.id===id);if(!u)return;
  sepetEkle(u,1,10,0);
}

// ── SEPET ──
function sepetEkle(urun,qty,boyutEkstra,malzemeEkstra){
  const mevcut=sepet.find(s=>s.id===urun.id&&s.boyutEkstra===boyutEkstra&&s.malzemeEkstra===malzemeEkstra);
  if(mevcut){mevcut.qty+=qty;}
  else{sepet.push({...urun,qty,boyutEkstra,malzemeEkstra,sepetId:Date.now()});}
  renderSepet();
  toast(`✅ "${urun.isim}" sepete eklendi!`);
}
function renderSepet(){
  const count=sepet.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartDot').textContent=count;
  const total=sepet.reduce((s,i)=>s+(i.fiyat+i.boyutEkstra+i.malzemeEkstra)*i.qty,0);
  document.getElementById('cdTotal').textContent=total+'₺';
  if(!sepet.length){document.getElementById('cdItems').innerHTML='<div class="cd-empty">📭 Sepetiniz boş</div>';return;}
  document.getElementById('cdItems').innerHTML=sepet.map((item,i)=>`
    <div class="cd-item">
      <div class="cd-img"><img src="${item.thumbnail}" alt="${item.isim}"></div>
      <div>
        <div class="cd-name">${item.isim}</div>
        <div class="cd-detail">${item.qty} adet · ${item.fiyat+item.boyutEkstra+item.malzemeEkstra}₺/adet</div>
        <div class="cd-foot-row">
          <div class="cd-price">${(item.fiyat+item.boyutEkstra+item.malzemeEkstra)*item.qty}₺</div>
          <div class="cd-remove" onclick="sepetKaldir(${i})">🗑️ Kaldır</div>
        </div>
      </div>
    </div>
  `).join('');
}
function sepetKaldir(i){sepet.splice(i,1);renderSepet();}
function openCart(){document.getElementById('cartDr').classList.add('open');document.getElementById('cartOv').classList.add('open');}
function closeCart(){document.getElementById('cartDr').classList.remove('open');document.getElementById('cartOv').classList.remove('open');}
function checkout(){
  if(!sepet.length){toast('⚠️ Sepet boş!');return;}
  const total=sepet.reduce((s,i)=>s+(i.fiyat+i.boyutEkstra+i.malzemeEkstra)*i.qty,0);
  const msg=`🛒 Yeni Sipariş!\n${sepet.map(i=>`• ${i.isim} x${i.qty}`).join('\n')}\nToplam: ${total}₺`;
  const waUrl=`https://wa.me/905XXXXXXXXX?text=${encodeURIComponent(msg)}`;
  window.open(waUrl,'_blank');
  toast('📱 WhatsApp açılıyor…');
}

// Başlat — URL'de ?kat=xxx varsa o kategoriyi aç
async function baslat(){
  await yukle();
  const kat = new URLSearchParams(window.location.search).get('kat');
  if(kat && kat !== 'hepsi'){
    setKat(kat);
    // Kategori chip'ini aktif göster
    document.querySelectorAll('.cat-chip').forEach(c=>{
      c.classList.toggle('active', c.textContent.trim() === (KAT_ISIM[kat]||kat));
    });
    // Sayfayı üst kısma kaydır
    window.scrollTo({top:0, behavior:'smooth'});
  }
}
baslat();
</script>
